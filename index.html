<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RPG teste</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="aviso-orientacao">Por favor, vire o celular deitado 🔄</div>

    <div id="mundo">
        <div id="player"></div>
    </div>

    <div id="ui-touch">
        <div class="direcionais">
            <button id="btn-up" class="btn">↑</button>
            <div class="meio">
                <button id="btn-left" class="btn">←</button>
                <button id="btn-down" class="btn">↓</button>
                <button id="btn-right" class="btn">→</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
