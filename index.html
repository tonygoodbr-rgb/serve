<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RPG Beta - RedMagic Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="mundo">
        <div id="player"></div>
    </div>

    <div id="ui-touch">
        <div class="direcionais">
            <div class="btn-joy" id="btn-up">↑</div>
            <div class="meio">
                <div class="btn-joy" id="btn-left">←</div>
                <div class="btn-joy" id="btn-down">↓</div>
                <div class="btn-joy" id="btn-right">→</div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
